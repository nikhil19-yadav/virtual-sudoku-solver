<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background"></div>

    <div class="login-container">
        <div class="login-box">
            <h1>Welcome to Sudoku!</h1>
            <p>Ready to sharpen your mind?</p>

            <form action="#" method="POST">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button class="social-btn google-btn">
                <img src="https://www.google.com/favicon.ico" alt="Google Icon"> Continue with Google
            </button>
            <button class="social-btn github-btn">
                <img src="https://github.com/favicon.ico" alt="GitHub Icon"> Continue with GitHub
            </button>

            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Create Account</a>
            </div>
        </div>
    </div>
</body>
</html>
